steps:
  # Deploy. Sensitive keys come from Secret Manager (--set-secrets); only
  # non-sensitive config is passed as plain env vars. --set-secrets fully
  # replaces the secret set, so no separate "clear stale secrets" step is
  # needed (and removing it avoids a brief revision with no API keys).
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'planner-pulse'
      - '--source=.'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      # More memory + lower per-instance concurrency to prevent OOM (the search
      # cards fetch/parse article pages concurrently to verify dates).
      - '--memory=1Gi'
      - '--concurrency=40'
      # Non-sensitive config only (IDs, sender display fields, ClickUp list id).
      - '--set-env-vars=ONTRAPORT_APP_ID=${_ONTRAPORT_APP_ID},GOOGLE_CLIENT_ID=${_GOOGLE_CLIENT_ID},SENDGRID_FROM_EMAIL=${_SENDGRID_FROM_EMAIL},SENDGRID_FROM_NAME=${_SENDGRID_FROM_NAME},CLICKUP_LIST_ID=${_CLICKUP_LIST_ID}'
      # All secrets from Secret Manager (per-app secrets + shared Google Docs creds).
      - '--set-secrets=GOOGLE_DOCS_CREDENTIALS=google-docs-credentials:latest,FLASK_SECRET_KEY=planner-pulse-FLASK_SECRET_KEY:latest,OPENAI_API_KEY=planner-pulse-OPENAI_API_KEY:latest,GOOGLE_AI_API_KEY=planner-pulse-GOOGLE_AI_API_KEY:latest,ANTHROPIC_API_KEY=planner-pulse-ANTHROPIC_API_KEY:latest,PERPLEXITY_API_KEY=planner-pulse-PERPLEXITY_API_KEY:latest,ONTRAPORT_API_KEY=planner-pulse-ONTRAPORT_API_KEY:latest,GOOGLE_CLIENT_SECRET=planner-pulse-GOOGLE_CLIENT_SECRET:latest,SENDGRID_API_KEY=planner-pulse-SENDGRID_API_KEY:latest,CLICKUP_API_TOKEN=planner-pulse-CLICKUP_API_TOKEN:latest'
options:
  logging: CLOUD_LOGGING_ONLY
  # ALLOW_LOOSE so the deploy still succeeds if some non-sensitive substitution
  # vars (_SENDGRID_FROM_*, _CLICKUP_LIST_ID) aren't defined on the trigger.
  substitution_option: 'ALLOW_LOOSE'
timeout: '1200s'
